version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt || true
      - pip install pytest pytest-cov pylint bandit semgrep trivy || true

  pre_build:
    commands:
      - echo "Running linting..."
      - pylint *.py || true
      - echo "Running Bandit (SAST)..."
      - bandit -r . || true
      - echo "Running Semgrep (SAST)..."
      - semgrep scan --config=auto || true

  build:
    commands:
      - echo "Running unit tests..."
      - pytest --cov=. || true

  post_build:
    commands:
      - echo "Running Trivy vulnerability scan..."
      - trivy fs . || true
      - echo "All tests & scans complete."

artifacts:
  files:
    - "**/*"
